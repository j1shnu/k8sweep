version: 2

builds:
  - id: k8sweep
    main: .
    binary: k8sweep
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    exclude:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: k8sweep
    builds:
      - k8sweep
    name_template: "k8sweep_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: checksums.txt
  algorithm: sha256

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  github:
    owner: j1shnu
    name: k8sweep
  draft: false
  prerelease: auto
  name_template: "{{.Tag}}"
